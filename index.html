<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>شركة العفاس للنقل و الخدمات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding:
        calc(36px + env(safe-area-inset-top))
        calc(16px + env(safe-area-inset-right))
        calc(32px + env(safe-area-inset-bottom))
        calc(16px + env(safe-area-inset-left));
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      /* Fond : dégradé bleu nuit / anthracite, cohérent avec le doré du logo */
      background: linear-gradient(160deg, #0a0e17 0%, #0d1420 45%, #0a0d14 100%);
      background-attachment: fixed;
    }

    /* Halos lumineux fixes (dorés uniquement, cohérents avec le logo) */
    body::before {
      content: '';
      position: fixed;
      top: -10%; left: 50%;
      transform: translateX(-50%);
      width: min(700px, 100vw);
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,.14) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%; left: 30%;
      width: 450px; height: 450px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Canvas particules */
    #cnv { position:fixed; inset:0; z-index:0; pointer-events:none; }

    /* ═══ CARTE ═══ */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border-radius: 28px;
      overflow: hidden;
      /* Fond carte semi-transparent */
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(201,168,76,.22);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(201,168,76,.06),
        0 40px 100px rgba(0,0,0,.70),
        0 16px 40px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.10);
    }

    /* Ligne dorée haut de carte */
    .stripe {
      height: 2.5px;
      background: linear-gradient(90deg, transparent, #8a5e10 10%, #c9a84c 35%, #f0d472 50%, #c9a84c 65%, #8a5e10 90%, transparent);
    }

    /* Corps */
    .body {
      padding: 30px 22px 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ═══ LOGO — carré arrondi, logo complet visible ═══ */
    .logo-wrap {
      position: relative;
      width: 150px;
      height: 150px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    /* Anneau doré tournant */
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 28px;
      background: conic-gradient(
        from 0deg,
        #8a5e10, #c9a84c 25%, #f5e080 50%, #c9a84c 75%, #8a5e10
      );
      animation: spin 7s linear infinite;
      z-index: 0;
    }

    /* Fond blanc derrière l'image */
    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 22px;
      background: #ffffff;
      z-index: 1;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Image : arrondie, contenu complet visible */
    .logo-img {
      position: absolute;
      inset: 3px;
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      border-radius: 22px;
      object-fit: contain;
      object-position: center;
      background: #ffffff;
      z-index: 2;
      display: block;
      padding: 6px;
    }

    /* ═══ TEXTES ═══ */
    .brand {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(19px, 5.5vw, 24px);
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      direction: rtl;
      line-height: 1.3;
      text-shadow: 0 2px 24px rgba(0,0,0,.5);
      margin-bottom: 5px;
    }

    .sub {
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: .28em;
      color: #c9a84c;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 18px;
    }

    /* Séparateur */
    .sep {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .sep-l {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,.40));
    }
    .sep-r {
      flex: 1; height: 1px;
      background: linear-gradient(270deg, transparent, rgba(201,168,76,.40));
    }
    .sep i { color: #c9a84c; font-size: 11px; opacity: .85; }

    /* Tagline */
    .tagline {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(12px, 3.5vw, 13.5px);
      color: rgba(255,255,255,.60);
      text-align: center;
      direction: rtl;
      line-height: 1.65;
      margin-bottom: 6px;
    }
    .tagline strong { color: rgba(255,255,255,.85); }

    /* Ligne "تفكيك . تغليف . تركيب" avec petites icônes séparatrices */
    .tagline-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      direction: rtl;
      margin-bottom: 14px;
    }
    .tagline-steps span {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(12px, 3.5vw, 13.5px);
      font-weight: 600;
      color: rgba(255,255,255,.60);
    }
    .tagline-steps i {
      font-size: 4px;
      color: #c9a84c;
      opacity: .85;
    }

    /* Petits labels de section */
    .sec-label {
      align-self: flex-start;
      font-family: 'Cairo', sans-serif;
      font-size: clamp(9.5px, 2.5vw, 10.5px);
      letter-spacing: .18em;
      font-weight: 700;
      color: rgba(201,168,76,.65);
      text-transform: uppercase;
      direction: rtl;
      margin-bottom: 10px;
    }

    /* ═══ SERVICES ═══ */
    .services {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 18px;
    }
    .service {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(201,168,76,.20);
      transition: background .18s, border-color .18s, transform .14s;
    }
    .service:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(201,168,76,.38);
      transform: translateY(-2px);
    }
    .service .s-ico {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: grid; place-items: center;
      background: rgba(201,168,76,.14);
      flex-shrink: 0;
    }
    .service .s-ico i { font-size: 15px; color: #e8c96e; }
    .service span {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(10.5px, 2.9vw, 12px);
      font-weight: 700;
      color: rgba(255,255,255,.80);
      text-align: center;
      direction: rtl;
      line-height: 1.3;
    }

    /* Barre d'infos (couverture + disponibilité) */
    .infobar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 13px 12px;
      border-radius: 14px;
      background: rgba(201,168,76,.08);
      border: 1px solid rgba(201,168,76,.25);
      margin-bottom: 24px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .info-item i { font-size: 12px; color: #c9a84c; flex-shrink: 0; }
    .info-item span {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(10.5px, 2.9vw, 12px);
      font-weight: 700;
      color: #e8c96e;
      direction: rtl;
      white-space: nowrap;
    }
    .info-sep {
      width: 1px;
      height: 20px;
      background: rgba(201,168,76,.30);
      flex-shrink: 0;
    }

    /* ═══ BOUTONS ═══ */
    .btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: clamp(52px, 14vw, 58px);
      padding: 0 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration: none;
      color: #f0f4ff;
      font-family: 'Poppins', sans-serif;
      font-size: clamp(13px, 3.8vw, 15px);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .18s, border-color .18s, transform .14s, box-shadow .18s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0 0 50% 0;
      background: linear-gradient(180deg, rgba(255,255,255,.05), transparent);
      pointer-events: none;
    }

    .btn:hover {
      background: rgba(255,255,255,.13);
      border-color: rgba(201,168,76,.38);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,.30);
    }
    .btn:active { transform: scale(.98); box-shadow: none; }

    .bl { display: flex; align-items: center; gap: 13px; }

    .ico {
      width: 38px; height: 38px;
      border-radius: 12px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .ico i { font-size: clamp(15px, 4vw, 17px); }

    /* Couleurs plateformes */
    .c-call .ico { background: rgba(52,199,89,.18);  } .c-call .ico i { color: #4ade80; }
    .c-wa   .ico { background: rgba(37,211,102,.18); } .c-wa   .ico i { color: #25d366; }
    .c-fb   .ico { background: rgba(59,130,246,.18); } .c-fb   .ico i { color: #60a5fa; }
    .c-ig   .ico { background: rgba(236,72,153,.18); } .c-ig   .ico i { color: #f472b6; }

    .chev { color: rgba(201,168,76,.50); font-size: 12px; }

    /* Bouton or plein */
    .btn-gold {
      background: linear-gradient(135deg, #c9a84c, #f0d472 50%, #a07828);
      border: none;
      color: #1a0e00;
      font-weight: 700;
      box-shadow: 0 8px 28px rgba(201,168,76,.35);
    }
    .btn-gold::after { background: linear-gradient(180deg, rgba(255,255,255,.18), transparent); }
    .btn-gold .ico   { background: rgba(0,0,0,.14); }
    .btn-gold .ico i { color: #2d1a00; }
    .btn-gold .chev  { color: rgba(45,26,0,.50); }
    .btn-gold:hover  {
      background: linear-gradient(135deg, #d4b455, #f8e882, #b8902e);
      box-shadow: 0 14px 36px rgba(201,168,76,.45);
    }

    /* Footer */
    .footer {
      margin-top: 22px;
      font-size: clamp(10px, 2.8vw, 12px);
      color: rgba(255,255,255,.30);
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .footer i { color: rgba(201,168,76,.50); font-size: 9px; }

    /* Notification */
    .notif {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 16px; right: 16px;
      max-width: 420px;
      margin: 0 auto;
      background: linear-gradient(135deg, #c9a84c, #9a7020);
      color: #1a0f00;
      border-radius: 16px;
      padding: 13px 20px;
      text-align: center;
      font-weight: 800;
      font-size: clamp(13px, 3.5vw, 14px);
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 12px 36px rgba(201,168,76,.42);
      transform: translateY(140%);
      transition: transform .32s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
    }
    .notif.show { transform: translateY(0); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 390px) {
      .body { padding: 24px 16px 22px; }
      .logo-wrap { width: 130px; height: 130px; }
      .logo-img, .logo-wrap::after { border-radius: 19px; }
      .logo-wrap::before { border-radius: 24px; }
      .btn { height: 50px; padding: 0 13px; }
      .ico { width: 34px; height: 34px; border-radius: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-wrap::before { animation: none; }
      .btn, .notif { transition: none; }
    }
  </style>
</head>

<script>
  /* Particules dorées */
  const cnv = document.getElementById('cnv');
  const ctx = cnv.getContext('2d');
  const red = matchMedia('(prefers-reduced-motion:reduce)').matches;

  function resize() {
    cnv.width  = innerWidth  * devicePixelRatio;
    cnv.height = innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resize();
  addEventListener('resize', resize);

  const pts = Array.from({length: red ? 0 : 55}, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * 1.8 + .5,
    vx: (Math.random() - .5) * .25,
    vy: (Math.random() - .5) * .25,
    a: Math.random() * .18 + .05
  }));

  function draw() {
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (const p of pts) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = innerWidth;  if (p.x > innerWidth)  p.x = 0;
      if (p.y < 0) p.y = innerHeight; if (p.y > innerHeight) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${p.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  if (!red) draw();

  /* vCard */
  document.getElementById('saveBtn').addEventListener('click', () => {
    const vcf = [
      'BEGIN:VCARD', 'VERSION:3.0',
      'FN:Affes Youssef - Transport & Services',
      'ORG:شركة العفاس للنقل و الخدمات',
      'TITLE:Transport & Services - Tunisie',
      'TEL;TYPE=CELL:+21657248099',
      'URL;type=Facebook:https://www.facebook.com/affes.youssef.2025',
      'URL;type=Instagram:https://www.instagram.com/youssefaffes18/',
      'END:VCARD'
    ].join('\r\n');
    const blob = new Blob([vcf], {type: 'text/vcard;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'Affes_Transport.vcf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    const n = document.getElementById('notif');
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 3000);
  });
</script>
